name: CI / CD

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (Node syntax check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Check JS syntax
        run: |
          find . -name "*.js" \
            ! -path "./node_modules/*" \
            ! -path "./.github/*" \
            -exec node --check {} \;

  test:
    name: Test (Node ${{ matrix.node }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - run: npm ci
      - run: npm run test:coverage
      - name: Upload coverage
        if: matrix.node == '20'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: Build verification
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --omit=dev
      - name: Verify app starts
        run: |
          timeout 5 node -e "
            const createApp = require('./app');
            const app = createApp();
            const server = app.listen(0, () => {
              console.log('App started on port', server.address().port);
              server.close(() => process.exit(0));
            });
          " || true
      - name: Create release archive
        run: |
          mkdir -p dist
          zip -r dist/swagstore.zip . \
            --exclude "node_modules/*" \
            --exclude ".git/*" \
            --exclude "coverage/*" \
            --exclude "dist/*"
      - uses: actions/upload-artifact@v4
        with:
          name: swagstore-build-${{ github.sha }}
          path: dist/swagstore.zip
          retention-days: 14

  deploy:
    name: Deploy to production
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://swagstore-production-8ef2.up.railway.app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --omit=dev
      - uses: actions/download-artifact@v4
        with:
          name: swagstore-build-${{ github.sha }}
          path: dist/
      - name: Deploy placeholder
        run: |
          echo "Artifact ready at dist/swagstore.zip"
          echo "Commit SHA: ${{ github.sha }}"
